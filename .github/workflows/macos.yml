name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-release:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Prerequisites
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install pkg-config make cmake ninja go autoconf automake libtool

      - name: Capture Compiler Stamp
        id: compiler-stamp
        run: |
          stamp="$(xcodebuild -version | tr '\n' ' ')-$(clang --version | head -n 1)"
          echo "value=$stamp" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Cache Native Impersonation Build
        uses: actions/cache@v4
        with:
          path: target/curl-impersonate-cache
          key: curl-impersonate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/curl-impersonate/distfiles/manifest.json', 'third_party/curl-impersonate/patches/**', 'crates/bird-curl-impersonate-sys/**') }}-${{ steps.compiler-stamp.outputs.value }}

      - name: Shadow curl
        run: |
          mkdir -p "$RUNNER_TEMP/no-network-bin"
          cat > "$RUNNER_TEMP/no-network-bin/curl" <<'EOF'
          #!/bin/sh
          echo "curl downloads are disabled in CI" >&2
          exit 97
          EOF
          chmod +x "$RUNNER_TEMP/no-network-bin/curl"
          echo "$RUNNER_TEMP/no-network-bin" >> "$GITHUB_PATH"

      - name: Build Release
        run: cargo build --locked --release -p bird-cli

      - name: Verify Static curl Linkage
        run: |
          otool -L target/release/bird
          if otool -L target/release/bird | grep -q 'libcurl'; then
            echo "unexpected dynamic libcurl dependency" >&2
            exit 1
          fi

      - name: Transport Sanity Check
        run: ./target/release/bird transport --json

  test:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Prerequisites
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install pkg-config make cmake ninja go autoconf automake libtool

      - name: Capture Compiler Stamp
        id: compiler-stamp
        run: |
          stamp="$(xcodebuild -version | tr '\n' ' ')-$(clang --version | head -n 1)"
          echo "value=$stamp" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Cache Native Impersonation Build
        uses: actions/cache@v4
        with:
          path: target/curl-impersonate-cache
          key: curl-impersonate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/curl-impersonate/distfiles/manifest.json', 'third_party/curl-impersonate/patches/**', 'crates/bird-curl-impersonate-sys/**') }}-${{ steps.compiler-stamp.outputs.value }}

      - name: Run Tests
        run: cargo test

  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Prerequisites (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install pkg-config make cmake ninja go autoconf automake libtool

      - name: Install Prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libcurl4-openssl-dev libssl-dev

      - name: Capture Compiler Stamp
        if: runner.os == 'macOS'
        id: compiler-stamp
        run: |
          stamp="$(xcodebuild -version | tr '\n' ' ')-$(clang --version | head -n 1)"
          echo "value=$stamp" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Cache Native Impersonation Build
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: target/curl-impersonate-cache
          key: curl-impersonate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('third_party/curl-impersonate/distfiles/manifest.json', 'third_party/curl-impersonate/patches/**', 'crates/bird-curl-impersonate-sys/**') }}-${{ steps.compiler-stamp.outputs.value }}

      - name: Build Release Package
        run: TARGET_TRIPLE=${{ matrix.target }} ./scripts/package-release.sh

      - name: Verify Release Artifacts
        run: |
          ls dist/bird-v*-${{ matrix.target }}.tar.gz
          ls dist/bird-v*-${{ matrix.target }}.tar.gz.sha256

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bird-package-${{ matrix.target }}
          path: |
            dist/bird-v*-${{ matrix.target }}.tar.gz
            dist/bird-v*-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
